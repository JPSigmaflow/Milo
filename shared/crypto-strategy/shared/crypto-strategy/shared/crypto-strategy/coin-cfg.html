<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;padding:30px;width:1080px}
.card{background:#14141f;border:1px solid #2a2a3a;border-radius:16px;padding:28px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.name{font-size:44px;font-weight:800;color:#f7931a}
.cat{font-size:20px;color:#888;background:#1a1a2e;padding:6px 16px;border-radius:8px}
.price-row{display:flex;gap:20px;align-items:baseline;margin-bottom:16px}
.price{font-size:48px;font-weight:800;color:#e0e0e0}
.change-pos{font-size:24px;color:#4caf50;background:#4caf5022;padding:4px 12px;border-radius:6px}
.change-neg{font-size:24px;color:#ff4444;background:#ff444422;padding:4px 12px;border-radius:6px}
.stats{display:flex;gap:16px;margin-bottom:18px}
.stat{flex:1;background:#1a1a2e;border-radius:10px;padding:14px;text-align:center}
.stat-val{font-size:28px;font-weight:700;color:#64b5f6}
.stat-lbl{font-size:16px;color:#888;margin-top:4px}
.contract-lbl{font-size:18px;color:#888;margin-bottom:4px}
.contract{font-family:'Courier New',monospace;font-size:18px;color:#aaa;background:#0d0d18;padding:10px 14px;border-radius:8px;word-break:break-all}
.chain{font-size:20px;color:#f7931a;margin-top:8px}
.rating{font-size:22px;margin-top:14px;padding:10px;background:#1a1a2e;border-radius:8px;text-align:center}
.footer{text-align:center;color:#555;font-size:14px;margin-top:16px}
</style></head><body>
<div class="card">
<div class="header">
<div class="name">CFG — Centrifuge</div>
<div class="cat">DeFi/RWA</div>
</div>
<div class="price-row">
<div class="price">$0.0795</div>
<div class="change-neg">-3.5% (24h)</div>
</div>
<div class="stats">
<div class="stat"><div class="stat-val">$45.8M</div><div class="stat-lbl">Market Cap</div></div>
<div class="stat"><div class="stat-val">$982k</div><div class="stat-lbl">24h Volume</div></div>
<div class="stat"><div class="stat-val">73/110</div><div class="stat-lbl">Juri Rating</div></div>
</div>
<div class="contract-lbl">⛓️ Polkadot (Native) — Contract Address:</div>
<div class="contract">Native Token — kein Contract</div>
</div>
<div class="footer">Milo 🦁 • WEundMILO • 12.02.2026</div>
</body></html>
