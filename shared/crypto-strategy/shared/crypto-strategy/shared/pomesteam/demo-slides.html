<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1280px; height: 720px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #fff; overflow: hidden; }
.slide { width: 1280px; height: 720px; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 60px; }
.slide.active { display: flex; }

/* Slide 1 - Title */
.slide-1 { background: linear-gradient(135deg, #ff4500, #ff8c00, #ffd700); }
.slide-1 .logo { font-size: 80px; font-weight: 800; margin-bottom: 20px; }
.slide-1 .subtitle { font-size: 32px; opacity: 0.9; }
.slide-1 .paws { font-size: 60px; margin-bottom: 20px; }

/* Slide 2 - About */
.slide-2 { background: #111; }
.slide-2 h2 { font-size: 42px; color: #ff8c00; margin-bottom: 30px; }
.slide-2 .info-box { background: #1a1a2e; border: 1px solid #333; border-radius: 16px; padding: 40px; max-width: 900px; }
.slide-2 .info-row { display: flex; align-items: center; gap: 20px; margin: 15px 0; font-size: 26px; }
.slide-2 .label { color: #888; min-width: 160px; }

/* Slide 3 - Flow */
.slide-3 { background: #111; }
.slide-3 h2 { font-size: 42px; color: #ff8c00; margin-bottom: 40px; }
.flow { display: flex; align-items: center; gap: 20px; }
.flow-step { background: #1a1a2e; border: 2px solid #ff8c00; border-radius: 16px; padding: 30px; text-align: center; width: 220px; }
.flow-step .icon { font-size: 48px; margin-bottom: 10px; }
.flow-step .text { font-size: 20px; }
.flow-arrow { font-size: 36px; color: #ff8c00; }

/* Slide 4 - API Integration */
.slide-4 { background: #111; align-items: flex-start; }
.slide-4 h2 { font-size: 42px; color: #ff8c00; margin-bottom: 30px; }
.code-block { background: #1e1e2e; border: 1px solid #333; border-radius: 12px; padding: 30px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 18px; line-height: 1.6; width: 100%; }

.code-block .keyword { color: #569cd6; }
.code-block .string { color: #ce9178; }
