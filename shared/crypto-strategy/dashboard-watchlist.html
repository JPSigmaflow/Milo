<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👀 Watchlist Dashboard</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --bg-card-hover: #1c2128;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --green: #3fb950;
            --red: #f85149;
            --blue: #58a6ff;
            --purple: #a371f7;
            --orange: #d29922;
            --gold: #f0c000;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .header h1 { font-size: 28px; display: flex; align-items: center; gap: 12px; }
        .last-update { color: var(--text-muted); font-size: 14px; }
        
        .refresh-btn {
            background: var(--blue);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .refresh-btn:hover { opacity: 0.8; }
        .refresh-btn:disabled { opacity: 0.5; }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        
        .stat-card .label { color: var(--text-muted); font-size: 13px; margin-bottom: 8px; text-transform: uppercase; }
        .stat-card .value { font-size: 24px; font-weight: 600; }
        .stat-card .change { font-size: 14px; margin-top: 4px; }
        
        .positive { color: var(--green); }
        .negative { color: var(--red); }
        
        .section { margin-bottom: 30px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .section h2 { font-size: 18px; display: flex; align-items: center; gap: 8px; }
        
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        
        table { width: 100%; border-collapse: collapse; }
        
        th, td { padding: 14px 16px; text-align: left; }
        
        th {
            background: var(--bg-card-hover);
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
        tr:hover td { background: var(--bg-card-hover); }
        
        .coin-name { display: flex; align-items: center; gap: 10px; }
        
        .coin-symbol {
            background: var(--bg-card-hover);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            color: var(--blue);
        }
        
        .coin-fullname { color: var(--text-muted); font-size: 13px; }
        .mcap { color: var(--text-muted); font-size: 13px; }
        
        .trend-up::after { content: ' 📈'; }
        .trend-down::after { content: ' 📉'; }
        
        .category-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--purple);
            color: #fff;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .gem-section {
            margin-top: 30px;
        }
        
        .gem-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }
        
        .gem-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, #1a1a2e 100%);
            border: 1px solid var(--purple);
            border-radius: 12px;
            padding: 16px;
        }
        
        .gem-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .gem-name { font-weight: 600; }
        .gem-mcap { color: var(--purple); font-size: 13px; }
        .gem-desc { color: var(--text-muted); font-size: 13px; line-height: 1.4; }
        .gem-stats { display: flex; gap: 16px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .gem-stat { font-size: 13px; }
        .gem-stat-label { color: var(--text-muted); font-size: 11px; }
        
        .alert-banner {
            background: linear-gradient(135deg, #1f2d1f 0%, #1f1f2d 100%);
            border: 1px solid var(--green);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .alert-icon { font-size: 24px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>👀 Watchlist Dashboard</h1>
        <div style="display: flex; align-items: center; gap: 16px;">
            <span class="last-update" id="lastUpdate">Lädt...</span>
            <button class="refresh-btn" onclick="refreshData()" id="refreshBtn">🔄 Refresh</button>
        </div>
    </div>
    
    <div id="alertBanner"></div>
    
    <div class="stats-row">
        <div class="stat-card">
            <div class="label">Watchlist</div>
            <div class="value" id="watchCount">10</div>
            <div class="change">Coins beobachtet</div>
        </div>
        <div class="stat-card">
            <div class="label">Top Performer</div>
            <div class="value positive" id="topPerformer">-</div>
            <div class="change" id="topPerformerName">24h</div>
        </div>
        <div class="stat-card">
            <div class="label">Schlechtester</div>
            <div class="value negative" id="worstPerformer">-</div>
            <div class="change" id="worstPerformerName">24h</div>
        </div>
        <div class="stat-card">
            <div class="label">Micro-Caps</div>
            <div class="value" style="color: var(--purple);">3</div>
            <div class="change">&lt;$10M MCap</div>
        </div>
    </div>
    
    <div class="section">
        <div class="section-header">
            <h2>📊 Beobachtete Coins</h2>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Coin</th>
                        <th>Preis</th>
                        <th>24h</th>
                        <th>7d</th>
                        <th>MCap</th>
                        <th>Kategorie</th>
                    </tr>
                </thead>
                <tbody id="watchlistTable">
                    <tr><td colspan="6" style="text-align:center; padding:40px;"><div class="loading"></div> Lade Daten...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="section gem-section">
        <div class="section-header">
            <h2>💎 Micro-Cap Gems (&lt;$10M)</h2>
        </div>
        <div class="gem-grid" id="gemGrid"></div>
    </div>

    <script>
        const WATCHLIST = [
            { id: 'alephium', symbol: 'ALPH', name: 'Alephium', category: 'L1 Sharding' },
            { id: 'kaspa', symbol: 'KAS', name: 'Kaspa', category: 'BlockDAG' },
            { id: 'ergo', symbol: 'ERG', name: 'Ergo', category: 'eUTXO' },
            { id: 'flux', symbol: 'FLUX', name: 'Flux', category: 'Cloud' },
            { id: 'oasis-network', symbol: 'ROSE', name: 'Oasis Network', category: 'Privacy' },
            { id: 'mina-protocol', symbol: 'MINA', name: 'Mina Protocol', category: 'ZK' },
            { id: 'nervos-network', symbol: 'CKB', name: 'Nervos Network', category: 'PoW' },
            { id: 'akash-network', symbol: 'AKT', name: 'Akash Network', category: 'DePIN' },
            { id: 'horizen', symbol: 'ZEN', name: 'Horizen', category: 'Privacy' },
            { id: 'zilliqa', symbol: 'ZIL', name: 'Zilliqa', category: 'Sharding' }
        ];
        
        async function fetchPrices() {
            try {
                const ids = WATCHLIST.map(c => c.id).join(',');
                const response = await fetch(
                    `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&sparkline=false&price_change_percentage=24h,7d`
                );
                return await response.json();
            } catch (error) {
                console.error('Fehler:', error);
                return null;
            }
        }
        
        function formatPrice(price) {
            if (price < 0.001) return '$' + price.toFixed(6);
            if (price < 1) return '$' + price.toFixed(4);
            return '$' + price.toFixed(2);
        }
        
        function formatMcap(mcap) {
            if (mcap >= 1e9) return '$' + (mcap / 1e9).toFixed(1) + 'B';
            if (mcap >= 1e6) return '$' + (mcap / 1e6).toFixed(0) + 'M';
            return '$' + mcap.toLocaleString();
        }
        
        function formatPercent(pct) {
            if (pct === null || pct === undefined) return '-';
            const sign = pct >= 0 ? '+' : '';
            return sign + pct.toFixed(2) + '%';
        }
        
        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="loading"></div>';
            
            const data = await fetchPrices();
            
            if (data && data.length > 0) {
                renderWatchlist(data);
                document.getElementById('lastUpdate').textContent = 
                    'Aktualisiert: ' + new Date().toLocaleTimeString('de-DE');
            }
            
            btn.disabled = false;
            btn.innerHTML = '🔄 Refresh';
        }
        
        function renderWatchlist(data) {
            let html = '';
            let gems = [];
            let topPct = -Infinity, worstPct = Infinity;
            let topName = '', worstName = '';
            
            // Sort by market cap descending
            data.sort((a, b) => b.market_cap - a.market_cap);
            
            data.forEach(coin => {
                const info = WATCHLIST.find(w => w.id === coin.id) || {};
                const change24h = coin.price_change_percentage_24h || 0;
                const change7d = coin.price_change_percentage_7d_in_currency || 0;
                const changeClass = change24h >= 0 ? 'positive' : 'negative';
                const change7dClass = change7d >= 0 ? 'positive' : 'negative';
                
                if (change24h > topPct) { topPct = change24h; topName = info.symbol || coin.symbol.toUpperCase(); }
                if (change24h < worstPct) { worstPct = change24h; worstName = info.symbol || coin.symbol.toUpperCase(); }
                
                // Check if micro-cap
                if (coin.market_cap < 10000000) {
                    gems.push({ ...coin, ...info });
                }
                
                html += `
                    <tr>
                        <td>
                            <div class="coin-name">
                                <span class="coin-symbol">${info.symbol || coin.symbol.toUpperCase()}</span>
                                <span class="coin-fullname">${info.name || coin.name}</span>
                            </div>
                        </td>
                        <td>${formatPrice(coin.current_price)}</td>
                        <td class="${changeClass}">${formatPercent(change24h)}</td>
                        <td class="${change7dClass}">${formatPercent(change7d)}</td>
                        <td class="mcap">${formatMcap(coin.market_cap)}</td>
                        <td><span class="category-badge">${info.category || '-'}</span></td>
                    </tr>
                `;
            });
            
            document.getElementById('watchlistTable').innerHTML = html;
            document.getElementById('topPerformer').textContent = formatPercent(topPct);
            document.getElementById('topPerformerName').textContent = topName + ' (24h)';
            document.getElementById('worstPerformer').textContent = formatPercent(worstPct);
            document.getElementById('worstPerformerName').textContent = worstName + ' (24h)';
            
            // Render gems
            if (gems.length > 0) {
                let gemHtml = '';
                gems.forEach(gem => {
                    gemHtml += `
                        <div class="gem-card">
                            <div class="gem-header">
                                <span class="gem-name">💎 ${gem.symbol}</span>
                                <span class="gem-mcap">${formatMcap(gem.market_cap)}</span>
                            </div>
                            <div class="gem-desc">${gem.name} — ${gem.category || 'Crypto'}</div>
                            <div class="gem-stats">
                                <div class="gem-stat">
                                    <div class="gem-stat-label">Preis</div>
                                    <div>${formatPrice(gem.current_price)}</div>
                                </div>
                                <div class="gem-stat">
                                    <div class="gem-stat-label">24h</div>
                                    <div class="${gem.price_change_percentage_24h >= 0 ? 'positive' : 'negative'}">${formatPercent(gem.price_change_percentage_24h)}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('gemGrid').innerHTML = gemHtml;
            } else {
                document.getElementById('gemGrid').innerHTML = '<p style="color: var(--text-muted);">Keine Micro-Caps in der Watchlist</p>';
            }
            
            // Alert banner
            const alerts = [];
            data.forEach(coin => {
                const info = WATCHLIST.find(w => w.id === coin.id) || {};
                if (coin.price_change_percentage_24h > 10) {
                    alerts.push(`🚀 ${info.symbol || coin.symbol.toUpperCase()} +${coin.price_change_percentage_24h.toFixed(1)}%`);
                } else if (coin.price_change_percentage_24h < -10) {
                    alerts.push(`⚠️ ${info.symbol || coin.symbol.toUpperCase()} ${coin.price_change_percentage_24h.toFixed(1)}%`);
                }
            });
            
            if (alerts.length > 0) {
                document.getElementById('alertBanner').innerHTML = `
                    <div class="alert-banner">
                        <span class="alert-icon">🔔</span>
                        <div>${alerts.join(' • ')}</div>
                    </div>
                `;
            }
        }
        
        refreshData();
        setInterval(refreshData, 60000);
    </script>
</body>
</html>
